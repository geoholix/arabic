<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi Ujian Bahasa Arab SD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}

header{background:linear-gradient(135deg,#1a5f3c,#2d9e5f);color:white;padding:18px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
header h1{font-size:clamp(1rem,4vw,1.5rem);margin-bottom:4px}
header p{font-size:clamp(.7rem,2.5vw,.85rem);opacity:.9}

.identity-bar{background:white;padding:12px 16px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;border-bottom:2px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.identity-bar label{font-size:.82rem;font-weight:600;color:#4a5568}
.identity-bar input{border:1px solid #cbd5e0;border-radius:6px;padding:5px 9px;font-size:.82rem;width:150px}
.field{display:flex;align-items:center;gap:6px}

.tabs{display:flex;overflow-x:auto;background:#1a5f3c;gap:2px;padding:0 8px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:rgba(255,255,255,.15);color:white;border:none;padding:10px 16px;font-size:.78rem;font-weight:600;cursor:pointer;border-radius:8px 8px 0 0;margin-top:6px;transition:background .2s;white-space:nowrap}
.tab-btn.active{background:#f0f4f8;color:#1a5f3c}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.28)}

.tab-panel{display:none;padding:14px;max-width:900px;margin:0 auto}
.tab-panel.active{display:block}

.section{background:white;border-radius:12px;padding:16px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #2d9e5f}
.section-title{font-size:.92rem;font-weight:700;color:#1a5f3c;margin-bottom:4px;padding-bottom:8px;border-bottom:1px solid #e2e8f0}
.section-inst{font-size:.78rem;color:#718096;margin-bottom:14px;margin-top:6px;background:#f0fdf4;padding:7px 10px;border-radius:6px}

/* Question */
.question{margin-bottom:18px;padding-bottom:16px;border-bottom:1px dashed #e2e8f0}
.question:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.q-label{font-size:.88rem;font-weight:600;color:#2d3748;margin-bottom:8px;line-height:1.5}
.arabic{font-family:'Traditional Arabic','Scheherazade New','Arial Unicode MS',serif;font-size:1.5rem;direction:rtl;display:inline-block;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:4px 14px;margin:2px 0;color:#14532d;line-height:1.6}
.arabic-sm{font-family:'Traditional Arabic','Scheherazade New','Arial Unicode MS',serif;font-size:1.2rem;direction:rtl;display:inline;color:#14532d}
.arabic-inline{font-family:'Traditional Arabic','Scheherazade New','Arial Unicode MS',serif;font-size:1.15rem;direction:rtl;display:inline-block;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:5px;padding:2px 10px;color:#14532d}

/* Options */
.options{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.opt{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:8px;border:1.5px solid #e2e8f0;cursor:pointer;transition:all .15s;font-size:.86rem;user-select:none}
.opt:hover{border-color:#2d9e5f;background:#f0fdf4}
.opt.selected{border-color:#2d9e5f;background:#f0fdf4}
.opt.correct{background:#dcfce7!important;border-color:#16a34a!important;color:#14532d;font-weight:600}
.opt.wrong{background:#fee2e2!important;border-color:#dc2626!important;color:#991b1b}
.opt-key{width:26px;height:26px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;color:#4a5568;transition:all .15s}
.opt.selected .opt-key{background:#2d9e5f;color:white}
.opt.correct .opt-key{background:#16a34a;color:white}
.opt.wrong .opt-key{background:#dc2626;color:white}

/* Susun huruf display */
.letters-box{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;direction:rtl;justify-content:flex-end}
.letter-card{display:inline-flex;align-items:center;justify-content:center;min-width:38px;height:38px;border:2px solid #2d9e5f;border-radius:8px;background:#f0fdf4;font-family:'Traditional Arabic','Scheherazade New',serif;font-size:1.3rem;color:#14532d;padding:0 6px;font-weight:600}
.letters-separator{color:#94a3b8;font-size:1rem;align-self:center}

/* Sambunkan huruf display */
.sambung-box{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;direction:rtl;justify-content:flex-end;align-items:center}
.sambung-card{font-family:'Traditional Arabic','Scheherazade New',serif;font-size:1.3rem;color:#14532d;background:#fffbeb;border:1.5px dashed #f59e0b;border-radius:6px;padding:3px 8px;line-height:1.5}
.sambung-dash{color:#94a3b8;font-size:1.2rem;align-self:center;margin:0 2px}

/* Riddle clue box */
.clue-box{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:12px}
.clue-title{font-size:.72rem;font-weight:700;color:#92400e;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.clue-text{font-size:.84rem;color:#4a5568;line-height:1.6}
.clue-hint{font-family:'Traditional Arabic','Scheherazade New',serif;font-size:1.1rem;color:#1a5f3c;font-weight:700;margin-top:4px}

/* Kata tunjuk special options */
.kt-options{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.kt-opt{padding:10px 8px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;text-align:center;font-family:'Traditional Arabic','Scheherazade New',serif;font-size:1.3rem;direction:rtl;color:#14532d;background:#f0fdf4;transition:all .15s;user-select:none}
.kt-opt:hover{border-color:#2d9e5f;background:#dcfce7}
.kt-opt.selected{border-color:#2d9e5f;background:#dcfce7;box-shadow:0 0 0 2px rgba(45,158,95,.3)}
.kt-opt.correct{background:#dcfce7!important;border-color:#16a34a!important;font-weight:700}
.kt-opt.wrong{background:#fee2e2!important;border-color:#dc2626!important}
.kt-sub{font-family:'Segoe UI',Arial,sans-serif;font-size:.68rem;color:#718096;display:block;margin-top:2px;direction:ltr}

/* Image-dependent note */
.img-note{font-size:.72rem;color:#f59e0b;background:#fffbeb;border:1px solid #fcd34d;border-radius:4px;padding:3px 8px;display:inline-block;margin-top:4px}

/* Score area */
.score-area{background:white;border-radius:12px;padding:18px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.btn-submit{background:linear-gradient(135deg,#1a5f3c,#2d9e5f);color:white;border:none;padding:12px 28px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;width:100%;max-width:260px;box-shadow:0 3px 8px rgba(45,158,95,.4);transition:transform .1s,box-shadow .1s}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 5px 12px rgba(45,158,95,.5)}
.btn-reset{background:#718096;color:white;border:none;padding:9px 22px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;margin-top:9px;width:100%;max-width:160px}
.btn-reset:hover{background:#4a5568}
.score-display{display:none;margin-top:16px;padding:18px;border-radius:12px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #16a34a;animation:fadeIn .4s}
.score-display.shown{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.score-num{font-size:clamp(2.5rem,8vw,4rem);font-weight:900;color:#14532d;line-height:1}
.score-lbl{font-size:.82rem;color:#4a5568;margin-top:3px}
.score-bar{height:10px;background:#e2e8f0;border-radius:999px;margin:10px auto;max-width:240px;overflow:hidden}
.score-bar-fill{height:100%;background:linear-gradient(90deg,#16a34a,#4ade80);border-radius:999px;transition:width 1s ease;width:0}
.score-grade{font-size:1rem;font-weight:700;margin-top:8px;padding:5px 18px;border-radius:999px;display:inline-block}
.g-a{background:#dcfce7;color:#14532d}.g-b{background:#dbeafe;color:#1e3a5f}.g-c{background:#fef9c3;color:#713f12}.g-d{background:#fee2e2;color:#7f1d1d}
.score-det{margin-top:10px;font-size:.8rem;color:#4a5568;line-height:1.7}

/* Kunci jawaban */
.kunci{display:none;margin-top:16px;background:#fff8f1;border:1px solid #fed7aa;border-radius:10px;padding:14px;text-align:left}
.kunci.shown{display:block}
.kunci-title{font-weight:700;color:#c05621;margin-bottom:10px;font-size:.85rem}
.kunci-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:5px}
.ki{font-size:.78rem;color:#4a5568;background:white;padding:5px 8px;border-radius:6px;border:1px solid #fed7aa;line-height:1.4}
.ki span{font-weight:700;color:#1a5f3c}

@media(max-width:500px){
  .kt-options{grid-template-columns:1fr 1fr}
  .letters-box{justify-content:flex-start;direction:ltr}
}
</style>
</head>

// =========================================================
//  STATE
// =========================================================
const state = {}; // state[examId][qIndex] = selectedOptIndex

// =========================================================
//  RENDER
// =========================================================
function renderExam(examId) {
  const exam = EXAMS[examId];
  const container = document.getElementById(examId);
  if (!exam) return;

  state[examId] = {};

  let html = `<div style="text-align:center;margin:8px 0 14px;font-size:.8rem;color:#718096">${exam.subtitle}</div>`;

  let qGlobal = 0; // global question counter across sections for state indexing

  exam.sections.forEach(sec => {
    html += `<div class="section">
      <div class="section-title">${sec.title}</div>
      <div class="section-inst">${sec.inst}</div>`;

    sec.questions.forEach(q => {
      const sid = `${examId}-${sec.id}-${q.no}`;
      state[examId][sid] = null;

      if (sec.type === 'pg' || sec.type === 'translate' || sec.type === 'arabic_answer') {
        html += renderPGQuestion(sid, q, sec.type);
      } else if (sec.type === 'susun') {
        html += renderSusunQuestion(sid, q);
      } else if (sec.type === 'sambung') {
        html += renderSambungQuestion(sid, q);
      } else if (sec.type === 'riddle') {
        html += renderRiddleQuestion(sid, q);
      } else if (sec.type === 'kata_tunjuk') {
        html += renderKataTunjukQuestion(sid, q);
      }
    });

    html += `</div>`;
  });

  // Score area
  html += `
  <div class="score-area">
    <button class="btn-submit" onclick="submitExam('${examId}')">✅ Selesai &amp; Lihat Nilai</button><br>
    <button class="btn-reset" onclick="resetExam('${examId}')">🔄 Ulangi</button>
    <div class="score-display" id="score-${examId}">
      <div class="score-num" id="snum-${examId}">0</div>
      <div class="score-lbl">Nilai Akhir (0–100)</div>
      <div class="score-bar"><div class="score-bar-fill" id="sbar-${examId}"></div></div>
      <div class="score-grade" id="sgrade-${examId}"></div>
      <div class="score-det" id="sdet-${examId}"></div>
    </div>
    <div class="kunci" id="kunci-${examId}">
      <div class="kunci-title">🔑 Kunci Jawaban</div>
      <div class="kunci-grid">${exam.kunci.map(k=>`<div class="ki"><span>${k}</span></div>`).join('')}</div>
    </div>
  </div>`;

  container.innerHTML = html;
}

function renderPGQuestion(sid, q, type) {
  const note = type === 'arabic_answer' ?
    `<div class="clue-box"><div class="clue-title">Petunjuk</div><div class="clue-text" style="white-space:pre-line">${q.clue}</div></div>` : '';
  const qText = type === 'translate'
    ? `Artikan kalimat berikut! <div class="arabic" style="margin:6px 0">${q.arabic}</div>`
    : (q.q || '');
  return `<div class="question" id="q-${sid}">
    <div class="q-label">${q.no}. ${qText}</div>
    ${note}
    <div class="options">
      ${q.opts.map((o,i) => `
        <div class="opt" id="opt-${sid}-${i}" onclick="selectOpt('${sid}',${i})">
          <span class="opt-key">${['a','b','c','d'][i]}</span>
          <span>${o}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderSusunQuestion(sid, q) {
  const letterCards = q.letters.map(l =>
    `<span class="letter-card">${l}</span>`
  ).join('<span class="letters-separator">-</span>');
  return `<div class="question" id="q-${sid}">
    <div class="q-label">${q.no}. Susunlah huruf-huruf berikut menjadi satu kata!</div>
    <div class="letters-box">${letterCards}</div>
    <div class="options">
      ${q.opts.map((o,i) => `
        <div class="opt" id="opt-${sid}-${i}" onclick="selectOpt('${sid}',${i})">
          <span class="opt-key">${['a','b','c'][i]}</span>
          <span class="arabic-sm">${o}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderSambungQuestion(sid, q) {
  const cards = q.letters.map(l =>
    `<span class="sambung-card">${l}</span>`
  ).join('<span class="sambung-dash">+</span>');
  return `<div class="question" id="q-${sid}">
    <div class="q-label">${q.no}. Sambungkan huruf-huruf berikut menjadi satu kata!</div>
    <div class="sambung-box">${cards}</div>
    <div class="options">
      ${q.opts.map((o,i) => `
        <div class="opt" id="opt-${sid}-${i}" onclick="selectOpt('${sid}',${i})">
          <span class="opt-key">${['a','b','c'][i]}</span>
          <span class="arabic-sm">${o}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderRiddleQuestion(sid, q) {
  return `<div class="question" id="q-${sid}">
    <div class="q-label">${q.no}. Tebak kata berikut! Pilih jawaban dalam bahasa Arab.</div>
    <div class="clue-box">
      <div class="clue-title">🔍 Petunjuk</div>
      <div class="clue-text" style="white-space:pre-line">${q.clue}</div>
    </div>
    <div class="options">
      ${q.opts.map((o,i) => `
        <div class="opt" id="opt-${sid}-${i}" onclick="selectOpt('${sid}',${i})">
          <span class="opt-key">${['a','b','c'][i]}</span>
          <span class="arabic-sm">${o}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderKataTunjukQuestion(sid, q) {
  return `<div class="question" id="q-${sid}">
    <div class="q-label">${q.no}. "${q.desc}" → <b class="arabic" style="font-size:1.2rem">${q.arabic}</b> + ?</div>
    <div class="kt-options">
      ${q.opts.map((o,i) => `
        <div class="kt-opt" id="opt-${sid}-${i}" onclick="selectKT('${sid}',${i})">
          ${o}
          <span class="kt-sub">${q.sub[i]}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

// =========================================================
//  INTERACTION
// =========================================================
function selectOpt(sid, idx) {
  // Deselect previous
  const prev = state[sid.split('-')[0]][sid];
  if (prev !== null) {
    const prevEl = document.getElementById(`opt-${sid}-${prev}`);
    if (prevEl) prevEl.classList.remove('selected');
  }
  state[sid.split('-')[0]][sid] = idx;
  const el = document.getElementById(`opt-${sid}-${idx}`);
  if (el) el.classList.add('selected');
}

function selectKT(sid, idx) {
  selectOpt(sid, idx);
  // Also style kt-opt
  const examId = sid.split('-')[0];
  const secId = sid.split('-')[1];
  const no = sid.split('-')[2];
  for (let i=0; i<4; i++) {
    const el = document.getElementById(`opt-${sid}-${i}`);
    if (el) {
      el.classList.remove('selected');
    }
  }
  const el = document.getElementById(`opt-${sid}-${idx}`);
  if (el) el.classList.add('selected');
}

// =========================================================
//  SUBMIT & SCORE
// =========================================================
function submitExam(examId) {
  const exam = EXAMS[examId];
  let total = 0, correct = 0;
  const detailParts = [];

  exam.sections.forEach(sec => {
    let secTotal = sec.questions.length;
    let secCorrect = 0;

    sec.questions.forEach(q => {
      const sid = `${examId}-${sec.id}-${q.no}`;
      const selected = state[examId][sid];
      const isKT = sec.type === 'kata_tunjuk';

      // Show all options
      const numOpts = q.opts.length;
      for (let i=0; i<numOpts; i++) {
        const el = document.getElementById(`opt-${sid}-${i}`);
        if (!el) continue;
        el.classList.remove('selected');
        if (i === q.ans) {
          el.classList.add('correct');
        } else if (selected !== null && selected === i) {
          el.classList.add('wrong');
        }
        el.onclick = null; // disable further clicking
      }

      total++;
      if (selected === q.ans) { correct++; secCorrect++; }
    });

    detailParts.push(`${sec.title}: ${secCorrect}/${secTotal}`);
  });

  const score = total > 0 ? Math.round((correct/total)*100) : 0;

  // Show score
  const scoreDiv = document.getElementById(`score-${examId}`);
  scoreDiv.classList.add('shown');
  document.getElementById(`snum-${examId}`).textContent = score;

  setTimeout(() => {
    document.getElementById(`sbar-${examId}`).style.width = score+'%';
  }, 100);

  let grade, gClass;
  if (score >= 90) { grade='⭐ Sangat Baik (A)'; gClass='g-a'; }
  else if (score >= 75) { grade='✅ Baik (B)'; gClass='g-b'; }
  else if (score >= 60) { grade='📝 Cukup (C)'; gClass='g-c'; }
  else { grade='❗ Perlu Belajar Lagi (D)'; gClass='g-d'; }

  const gradeEl = document.getElementById(`sgrade-${examId}`);
  gradeEl.textContent = grade;
  gradeEl.className = 'score-grade '+gClass;

  document.getElementById(`sdet-${examId}`).innerHTML =
    `Benar: <b>${correct}</b> dari <b>${total}</b> soal<br>${detailParts.join(' · ')}`;

  document.getElementById(`kunci-${examId}`).classList.add('shown');
  scoreDiv.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function resetExam(examId) {
  state[examId] = {};
  renderExam(examId);
}

// =========================================================
//  TABS
// =========================================================
function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// =========================================================
//  INIT
// =========================================================
document.getElementById('inp-tgl').valueAsDate = new Date();
['ph1','ph2','ph3','ph4'].forEach(id => renderExam(id));
</script>
